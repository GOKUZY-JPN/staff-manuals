<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ガイドマニュアル | GOKU TRIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --red:#C0392B;--dark:#8B0000;--gold:#9A7B0A;--ink:#1a1208;
      --bg:#FAF7F3;--border:rgba(192,57,43,0.15);--sidebar-w:270px;--bar-h:56px;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--ink);font-family:'Noto Sans JP',sans-serif;line-height:1.8;display:flex;min-height:100vh}
    #sidebar{width:var(--sidebar-w);min-height:100vh;background:#111;position:fixed;top:0;left:0;display:flex;flex-direction:column;overflow-y:auto;z-index:300;transition:transform .28s ease}
    .sb-head{padding:28px 20px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sb-back{display:inline-block;font-size:11px;letter-spacing:.2em;color:rgba(255,255,255,.4);text-decoration:none;margin-bottom:16px;text-transform:uppercase}
    .sb-title{font-family:'Noto Serif JP',serif;font-size:15px;color:#fff;line-height:1.5;margin-bottom:4px}
    .sb-sub{font-size:10px;letter-spacing:.2em;color:var(--red);text-transform:uppercase}
    .sb-nav{padding:12px 0;flex:1}
    .nav-item{display:block;padding:13px 20px 13px 28px;font-size:14px;color:rgba(255,255,255,.5);cursor:pointer;border-left:3px solid transparent;line-height:1.4;transition:all .15s}
    .nav-item.active{color:#fff;border-left-color:var(--red);background:rgba(192,57,43,.1)}
    #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200}
    #overlay.show{display:block}
    #main{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
    #topbar{position:sticky;top:0;height:var(--bar-h);background:rgba(250,247,243,.96);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100}
    #menu-btn{display:none;flex-direction:column;justify-content:center;gap:5px;width:44px;height:44px;background:none;border:none;cursor:pointer;padding:8px;flex-shrink:0}
    #menu-btn span{display:block;height:2px;width:100%;background:var(--red);border-radius:2px}
    .tb-title{flex:1;font-size:12px;letter-spacing:.1em;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .tb-title b{color:var(--red);font-weight:400}
    .tb-btn{font-size:11px;letter-spacing:.1em;color:#888;background:none;border:1px solid var(--border);padding:7px 12px;cursor:pointer;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;flex-shrink:0}
    #content{max-width:820px;margin:0 auto;padding:36px 32px 120px}
    #content h1{font-family:'Noto Serif JP',serif;font-size:22px;font-weight:600;line-height:1.5;padding-bottom:14px;border-bottom:3px solid var(--red);margin-bottom:8px}
    #content h2{font-size:18px;font-weight:700;color:#fff;background:var(--dark);padding:12px 16px;margin-top:52px;margin-bottom:20px;border-radius:4px}
    #content h3{font-size:17px;font-weight:700;color:var(--dark);margin-top:36px;margin-bottom:12px;padding-left:10px;border-left:4px solid var(--red)}
    #content h4{font-size:15px;font-weight:700;color:var(--gold);margin-top:24px;margin-bottom:8px}
    #content p{font-size:17px;line-height:2.0;color:#2a1e10;margin-bottom:16px}
    #content ul,#content ol{padding-left:20px;margin-bottom:16px}
    #content li{font-size:17px;line-height:2.0;color:#2a1e10;margin-bottom:8px}
    #content blockquote{border-left:4px solid var(--gold);background:#FFF9EC;padding:14px 16px;margin:20px 0;border-radius:0 6px 6px 0}
    #content blockquote p{font-size:15px;color:#5a4010;font-style:italic;margin:0;line-height:1.8}
    #content hr{border:none;border-top:1px solid var(--border);margin:36px 0}
    #content code{font-family:monospace;font-size:13px;background:rgba(192,57,43,.07);color:var(--dark);padding:2px 6px;border-radius:3px}
    #content img{display:block;width:100%;max-width:600px;height:180px;object-fit:cover;margin:16px 0;border:1px solid var(--border);background:linear-gradient(135deg,#F0E8DC,#E0D5C5);border-radius:4px}
    #content table{width:100%;border-collapse:collapse;margin:16px 0 24px;font-size:15px;border-radius:6px;overflow:hidden}
    #content th{background:#1a1208;color:rgba(255,255,255,.9);font-size:12px;font-weight:700;letter-spacing:.08em;padding:11px 14px;text-align:left}
    #content td{padding:11px 14px;border-bottom:1px solid var(--border);color:#2a1e10;line-height:1.7;vertical-align:top}
    #content tr:last-child td{border-bottom:none}
    #content tr:nth-child(even) td{background:rgba(192,57,43,.03)}
    #loading{padding:80px 24px;text-align:center;font-size:13px;letter-spacing:.2em;color:#bbb}

    @media(max-width:768px){
      #sidebar{transform:translateX(-100%)}
      #sidebar.open{transform:translateX(0)}
      #main{margin-left:0}
      #menu-btn{display:flex}
      #content{padding:20px 14px 100px}
      #content h1{font-size:22px}
      #content h2{font-size:18px;padding:11px 14px;margin-top:44px}
      #content h3{font-size:17px}
      #content h4{font-size:16px}
      #content p,#content li{font-size:18px;line-height:2.1}
      #content blockquote p{font-size:16px}

      /* テーブル→カード形式 */
      #content table,#content thead,#content tbody,#content th,#content td,#content tr{display:block}
      #content thead{display:none}
      #content tr{background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
      #content td{padding:12px 14px;border-bottom:1px solid rgba(192,57,43,.08);font-size:16px;line-height:1.9}
      #content td:last-child{border-bottom:none}
      #content td[data-label]::before{content:attr(data-label);display:block;font-size:10px;font-weight:700;letter-spacing:.15em;color:var(--red);text-transform:uppercase;margin-bottom:3px;opacity:.8}
      #content tr:nth-child(even) td{background:transparent}
    }
    @media print{#sidebar,#topbar,#overlay{display:none!important}#main{margin-left:0}#content{padding:20px}}
  </style>
</head>
<body>
<div id="overlay" onclick="closeSidebar()"></div>
<nav id="sidebar">
  <div class="sb-head">
    <a class="sb-back" href="../../index.html">← 一覧に戻る</a>
    <div class="sb-title" id="sb-title">ガイドマニュアル</div>
    <div class="sb-sub">GOKU TRIP Staff Portal</div>
  </div>
  <div class="sb-nav" id="nav-links"></div>
</nav>
<div id="main">
  <div id="topbar">
    <button id="menu-btn" onclick="openSidebar()"><span></span><span></span><span></span></button>
    <div class="tb-title"><b id="tb-title">マニュアル</b></div>
    <a class="tb-btn" href="../../index.html">← 一覧</a>
    <button class="tb-btn" onclick="window.print()">印刷</button>
  </div>
  <div id="content"><div id="loading">読み込み中...</div></div>
</div>
<script>
  function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');document.body.style.overflow='hidden'}
  function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');document.body.style.overflow=''}

  fetch('./index.md')
    .then(r=>{if(!r.ok)throw new Error();return r.text()})
    .then(md=>{
      document.getElementById('content').innerHTML=marked.parse(md);
      setTitle();buildNav();makeCards();
    })
    .catch(()=>{document.getElementById('content').innerHTML='<p style="padding:40px 0;color:#999;font-size:15px;">マニュアルの読み込みに失敗しました。</p>'});

  function setTitle(){
    const h=document.querySelector('#content h1');
    if(!h)return;
    const t=h.textContent.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').trim().slice(0,20);
    document.getElementById('sb-title').textContent=t;
    document.getElementById('tb-title').textContent=t;
    document.title=t+' | GOKU TRIP';
  }

  function buildNav(){
    const nav=document.getElementById('nav-links');
    document.querySelectorAll('#content h2').forEach((h,i)=>{
      h.id='h'+i;
      const a=document.createElement('a');
      a.className='nav-item';
      a.textContent=h.textContent.replace(/^[\d️⃣🏯🦊🦌\s]+/,'').slice(0,22);
      a._id='h'+i;
      a.onclick=()=>{jump('h'+i);if(window.innerWidth<=768)closeSidebar()};
      nav.appendChild(a);
    });
    const obs=new IntersectionObserver(es=>{
      es.forEach(e=>{
        if(e.isIntersecting){
          document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
          document.querySelectorAll('.nav-item').forEach(n=>{if(n._id===e.target.id)n.classList.add('active')});
        }
      });
    },{rootMargin:'-10% 0px -80% 0px'});
    document.querySelectorAll('#content h2').forEach(h=>obs.observe(h));
  }

  function jump(id){
    const el=document.getElementById(id);
    if(!el)return;
    const top=el.getBoundingClientRect().top+window.scrollY-document.getElementById('topbar').offsetHeight-10;
    window.scrollTo({top,behavior:'smooth'});
  }

  function makeCards(){
    document.querySelectorAll('#content table').forEach(t=>{
      const headers=[...t.querySelectorAll('th')].map(th=>th.textContent.trim());
      t.querySelectorAll('tr').forEach(tr=>{
        [...tr.querySelectorAll('td')].forEach((td,i)=>{if(headers[i])td.setAttribute('data-label',headers[i])});
      });
    });
  }
</script>
</body>
</html>
